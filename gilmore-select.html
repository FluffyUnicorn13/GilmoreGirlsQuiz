<!DOCTYPE HTML>

<html lang="eng">
    <head>
        <meta charset="UTF-8">
        <title>Gilmore Girls Quiz Select</title>
        <link rel="stylesheet" href="styles.css"
    </head>

    <body class="quiz-page">
        <div class="login-container">
            <h1>Gilmore Girls Quiz</h1>

            <p>What would you like to do?</p>

            <button onclick="startMode('trivia')">Trivia Quiz!</button>
            <button onclick="startMode('characters')">Name the Characters!</button>
        </div>

        <script>
            function startMode(mode)
            {
                localStorage.setItem("quizMode", mode);
                window.location.href = "quiz.html"
            }
        </script>
    </body>
</html>
